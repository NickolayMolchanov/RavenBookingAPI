{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}

<div class="auth-container">

    <form method="post" class="auth-card">

        <h2>Регистрация</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            value="{{ username or '' }}"
            required
        >

        <input
            type="text"
            name="email"
            placeholder="Email"
            value="{{ email or '' }}"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Пароль"
            required
        >

        <input
            type="password"
            name="password2"
            placeholder="Повторите пароль"
            required
        >

        <button class="btn primary">Создать аккаунт</button>

        <p class="auth-switch">
            Уже есть аккаунт?
            <a href="/pages/login">Войти</a>
        </p>

    </form>

</div>

{% endblock %}
