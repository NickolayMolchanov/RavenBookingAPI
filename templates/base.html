<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}HotelRelax{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>

{% set user = request.state.user %}
<header class="navbar">
    <div class="container">
        <div class="logo">🏨 HotelRelax</div>

        <nav class="nav-links">
            <a href="/pages/index">Главная</a>
            <a href="/pages/hotels-list">Отели</a>
        </nav>



        <div class="auth-buttons">
            {% if user %}
                <span class="username">👤 {{ user.username }}</span>
                <a href="/pages/logout" class="btn">Выйти</a>
            {% else %}
                <a href="/pages/login" class="btn">Вход</a>
                <a href="/pages/register" class="btn primary">Регистрация</a>
                {% if user.role in ["moderator", "admin"] %}
                    <a href="/pages/partner" class="btn">Модерация</a>
                {% endif %}
            {% endif %}

        </div>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

</body>
</html>
