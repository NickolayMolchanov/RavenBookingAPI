{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}

<div class="auth-container">

    <form method="post" class="auth-card">

        <h2>Вход</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <input
            type="text"
            name="email"
            placeholder="Email"
            value="{{ email or '' }}"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Пароль"
            required
        >

        <button class="btn primary">Войти</button>

        <p class="auth-switch">
            Нет аккаунта?
            <a href="/pages/register">Зарегистрироваться</a>
        </p>

    </form>

</div>

{% endblock %}
